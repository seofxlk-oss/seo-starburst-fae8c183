[build]
  publish = "dist"
  command = "npm run build"

[build.processing]
  skip_processing = true

# pretty_urls = false prevents Netlify from auto-redirecting /page to /page/.
# Netlify still serves /page from /page/index.html automatically when this
# is false — which is exactly what we want, because our canonical URLs and
# sitemap do NOT use trailing slashes.
[build.processing.html]
  pretty_urls = false

# Force-strip any trailing slash a user types in (e.g. /seo-sri-lanka/
# -> /seo-sri-lanka) so we never split SEO equity across two URL forms.
[[redirects]]
  from = "/*/"
  to = "/:splat"
  status = 301
  force = true

# SPA fallback — Netlify only reaches this rule when no static file
# (including the per-route /<slug>/index.html files generated by
# scripts/generate-route-meta.mjs) matches the requested path.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
